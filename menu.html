<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<title>Velvet Bliss Menu</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

<div class="navbar">

    <div class="logo">
        <a href="index.html">
        <img src="image/velvet bliss logo.png" alt="Velvet Bliss Logo">
        </a>
    </div>

    <nav>
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    </nav>

</div>

<div class="menu">
    
    <h2>Cake Menu</h2>

    <p>Red velvet cake</p>
    <p>Price $20</p>
    <button onclick="addOrder('Red Velvet Cake',20)">Add to order</button><br>

    <p>Strawberry Ganache Cheesecake</p>
    <p>Price $22</p>
    <button onclick="addOrder('Strawberry Ganache Cheesecake',22)">Add to order</button><br>

    <p>Cookies and Creame Red Velvet Cake</p>
    <p>Price $23</p>
    <button onclick="addOrder('Cookies and Cream Red Velvet Cake',23)">Add to order</button><br>

    <p>Dessert Cup</p>
    <p>price $10</p>
    <button onclick="addOrder('Dessert Cup',10)">Add to order</button><br>

    <p>Strawberry Shortcake</p>
    <p>price $20</p>
    <button onclick="addOrder('Strawberry Shortcake',20)">Add to order</button><br>

    <p>White Velvet Bliss Cake</p>
    <p>Price $26</p>
    <button onclick="addOrder('White Velvet Bliss Cake',26)">Add to order</button><br>

</div>

<div class="orderHere">
    <h2>Order Here</h2>

    <div id="Order"></div>

    <h3 id="total">Total:$0</h3>

    <label>Name:</label>
    <input type="text" id="nameField" placeholder="Please insert your name"><br>

    <label>Money:</label>
    <input type="number" id="moneyField" placeholder="Money"><br>

    <button class="placeOrder" onclick="placeOrder()">Place Order</button>
    <button class="resetOrder" onclick="resetOrder()">Reset Order</button> 
</div>

<div id="receipt"></div>


  
<script src="MenuScript.js"></script>
</body>
</html>
